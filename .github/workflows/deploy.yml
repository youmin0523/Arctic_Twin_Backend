name: deploy-backend

# ============================================================
# backend → GitHub → AWS EC2  (SSH + git pull + docker compose)
# ------------------------------------------------------------
# main 에 push 되면 EC2 에 SSH 접속해 git 을 origin/main 으로 맞추고
# docker compose 로 재빌드·기동한다. (최초 부트스트랩은 deploy/ec2-setup.sh)
#
# 레포 Settings → Secrets and variables → Actions 에 등록 필요:
#   EC2_HOST     (필수)  EC2 퍼블릭 IP 또는 도메인  예: 13.51.x.x / api.arctictwin.com
#   EC2_SSH_KEY  (필수)  EC2 접속용 *개인키* 전체 (-----BEGIN ... END----- 포함)
#   EC2_USER     (선택)  기본 'ubuntu'
#   EC2_PORT     (선택)  기본 22
#   APP_DIR      (선택)  기본 ~/Arctic_Twin_Backend
# ============================================================

on:
  push:
    branches: [main]
    paths-ignore:        # 문서만 바뀌면 재배포하지 않음
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

concurrency:
  group: deploy-backend
  cancel-in-progress: false   # 배포 중엔 취소하지 않음(반쯤 갱신 방지)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.APP_DIR }}"
            APP_DIR="${APP_DIR:-$HOME/Arctic_Twin_Backend}"
            cd "$APP_DIR"

            echo "==> [1/4] GitHub origin/main 으로 동기화"
            PREV=$(git rev-parse HEAD)
            git fetch --all --prune
            # 서버 working tree 는 runtime 데이터가 docker 볼륨에 분리돼 있어 clean.
            # CI/CD 는 GitHub 가 단일 진실원본이므로 origin/main 에 정확히 맞춘다.
            git reset --hard origin/main
            NEW=$(git rev-parse HEAD)
            CHANGED=$(git diff --name-only "$PREV" "$NEW")
            echo "변경 파일:"; echo "$CHANGED" | sed 's/^/  /'

            # 변경 분류:
            #  - 의존성/빌드(requirements/package/Dockerfile/compose) 변경 → 이미지 풀 재빌드
            #    (40GB 디스크 제약상 옛 이미지 비우고 빌드 → 빌드 동안 짧은 다운타임)
            #  - 코드만 변경 → 재빌드 없이 변경 파일만 컨테이너에 복사 후 restart (무중단)
            CID=$(sudo docker compose ps -q backend || true)
            # 재빌드 필요 판정:
            #  - requirements/package/Dockerfile 변경 → 무조건 재빌드
            #  - docker-compose.yml 은 "주석(#)·공백 제외 실질 변경"이 있을 때만 재빌드
            #    (예: 인스턴스 타입 주석 정정 같은 변경은 무중단 restart 로 처리 — 다운타임 방지)
            #  - 컨테이너 없으면 무조건 재빌드
            NEED_REBUILD=0
            if echo "$CHANGED" | grep -qE '(^|/)(requirements\.txt|package\.json|package-lock\.json|Dockerfile)$'; then
              NEED_REBUILD=1
            fi
            if echo "$CHANGED" | grep -qE '(^|/)docker-compose\.yml$'; then
              COMPOSE_FUNC=$(git diff "$PREV" "$NEW" -- '*docker-compose.yml' \
                | grep -E '^[+-]' | grep -vE '^(\+\+\+|---)' \
                | grep -vE '^[+-][[:space:]]*#' | grep -vE '^[+-][[:space:]]*$' || true)
              if [ -n "$COMPOSE_FUNC" ]; then
                echo "  docker-compose.yml 실질 변경 감지 → 재빌드"
                NEED_REBUILD=1
              else
                echo "  docker-compose.yml 주석/공백만 변경 → 재빌드 생략(무중단)"
              fi
            fi
            if [ -z "$CID" ]; then NEED_REBUILD=1; fi
            if [ "$NEED_REBUILD" = "1" ]; then
              echo "==> [2/4] 의존성/이미지 변경(또는 컨테이너 없음) → 디스크 안전 풀 재빌드"
              # 빌드 공간 보장: SAR raw 아카이브가 디스크를 잠식해 이미지 빌드를 실패시키지 않도록
              # (1) 끊긴 부분 다운로드(.zip.tmp) 제거 (2) raw zip 을 하드캡(5GB)으로 오래된 것부터 FIFO 정리.
              # ⚠ 동향용 처리 산출물(*_latest.json, archive/, monthly/ — 작은 JSON)은 절대 건드리지 않는다.
              SAR_DIR="$(sudo docker volume inspect arctic_twin_backend_backend-data --format '{{.Mountpoint}}' 2>/dev/null || true)/sentinel1_archive"
              if [ -d "$SAR_DIR" ]; then
                echo "  SAR 아카이브 정리 전: $(sudo du -sh "$SAR_DIR" | cut -f1)"
                sudo find "$SAR_DIR" -type f -name '*.zip.tmp' -delete || true
                CAP_KB=$((5 * 1024 * 1024))   # 5GB
                while [ "$(sudo du -sk "$SAR_DIR" 2>/dev/null | cut -f1)" -gt "$CAP_KB" ]; do
                  OLD=$(sudo find "$SAR_DIR" -type f -name '*.zip' -printf '%T@ %p\n' 2>/dev/null | sort -n | head -1 | cut -d' ' -f2-)
                  [ -z "$OLD" ] && break
                  sudo rm -f "$OLD"
                done
                sudo find "$SAR_DIR" -mindepth 1 -type d -empty -delete 2>/dev/null || true
                echo "  SAR 아카이브 정리 후: $(sudo du -sh "$SAR_DIR" | cut -f1)"
              fi
              sudo docker compose down --remove-orphans || true
              sudo docker image prune -af || true
              sudo docker builder prune -af || true
              df -h / | tail -1
              sudo docker compose up -d --build
            else
              echo "==> [2/4] 코드만 변경 → 무중단 코드 패치 (재빌드 없음)"
              for f in $CHANGED; do
                if [ -f "$f" ]; then
                  sudo docker cp "$f" "$CID:/app/$f" && echo "  patched: $f" || echo "  skip: $f"
                fi
              done
              # Node 게이트웨이 재시작 → Python 서비스(report/rl/fuel) 새 코드로 재기동
              sudo docker compose restart
            fi

            echo "==> [3/4] dangling 이미지 정리"
            sudo docker image prune -f

            echo "==> [4/4] 헬스 체크 (모델 로드까지 대기, 최대 ~3.5분)"
            for i in $(seq 1 21); do
              if curl -fsS http://localhost:8000/api/health >/dev/null 2>&1; then
                echo "✅ backend healthy"
                exit 0
              fi
              echo "   대기 중... ($i/21)"; sleep 10
            done
            echo "❌ 헬스 체크 실패 — 최근 로그:"
            sudo docker compose logs --tail=80 backend
            exit 1
