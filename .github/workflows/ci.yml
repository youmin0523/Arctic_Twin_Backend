name: ci-backend

# ============================================================
# 백엔드 자동 테스트 — push / PR 시 Node·Python 테스트를 실행해 회귀를 차단한다.
# (배포는 deploy.yml 이 main push 에서만 담당. 이 워크플로는 검증 전용.)
# ============================================================

on:
  push:
    branches: [MS, develop, main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [develop, main]
  workflow_dispatch: {}

jobs:
  node-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Node 계약 테스트 (node:test)
        run: npm test

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 경량 테스트 의존성 설치 (순수 로직 + RL 환경 — torch 불필요)
        run: pip install pytest numpy gymnasium
      - name: POLARIS / route-scorer 단위 테스트
        run: python -m pytest tests/ -q
